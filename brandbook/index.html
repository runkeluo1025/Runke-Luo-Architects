<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrandBook — Interior Brand Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --ink:#0A0A0A; --grey:#8A8A86; --line:#000000; --gap:1px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg); color:var(--ink); font-family:'Space Grotesk',sans-serif; -webkit-font-smoothing:antialiased;}
  .caps{text-transform:uppercase; letter-spacing:.04em;}

  header.top{position:sticky; top:0; z-index:40; background:var(--bg); border-bottom:1px solid var(--ink);}
  .top-inner{max-width:1200px; margin:0 auto; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px;}
  .wordmark{display:flex; align-items:baseline; gap:8px; cursor:pointer;}
  .wordmark .mark{width:24px;height:24px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none;}
  .wordmark .name{font-size:20px; font-weight:700; letter-spacing:.02em;}
  .wordmark .sub{font-size:10.5px; color:var(--grey); letter-spacing:.1em; text-transform:uppercase; display:none;}
  @media(min-width:640px){.wordmark .sub{display:inline;}}

  nav.tabs{display:flex; gap:0; border:1px solid var(--ink);}
  nav.tabs button{border:none; background:#fff; padding:8px 14px; font-family:inherit; font-size:11.5px; letter-spacing:.05em; text-transform:uppercase; cursor:pointer; color:var(--ink); border-right:1px solid var(--ink);}
  nav.tabs button:last-child{border-right:none;}
  nav.tabs button.active{background:var(--ink); color:#fff;}

  .search-wrap{display:none;}
  @media(min-width:860px){.search-wrap{display:block;}}
  .search-wrap input{border:1px solid var(--ink); background:#fff; padding:7px 10px; font-family:inherit; font-size:11.5px; width:170px; color:var(--ink);}

  main{max-width:1200px; margin:0 auto; padding:22px 20px 90px;}

  .section-head{display:flex; align-items:baseline; justify-content:space-between; margin:6px 0 18px; flex-wrap:wrap; gap:8px;}
  .section-head h1{font-size:26px; margin:0; font-weight:700; letter-spacing:.01em;}
  .section-head p{margin:3px 0 0; color:var(--grey); font-size:12.5px;}
  .count-pill{font-size:10.5px; border:1px solid var(--ink); padding:3px 9px; text-transform:uppercase; letter-spacing:.05em;}

  .chips{display:flex; gap:0; flex-wrap:wrap; margin-bottom:20px; border-top:1px solid var(--ink); border-left:1px solid var(--ink);}
  .chip{border:none; border-right:1px solid var(--ink); border-bottom:1px solid var(--ink); background:#fff; color:var(--ink); font-family:inherit; font-size:11px; padding:7px 12px; cursor:pointer; display:flex; align-items:center; gap:6px; text-transform:uppercase; letter-spacing:.04em;}
  .chip.active{background:var(--ink); color:#fff;}
  .chip .dot{width:9px;height:9px;border-radius:50%;display:inline-block; border:1px solid rgba(0,0,0,.25);}

  /* edge-to-edge square grid: black background peeking through as hairlines */
  .grid{display:grid; gap:var(--gap); background:var(--ink); border:var(--gap) solid var(--ink);}
  .tile-filler{background:#fff;}
  .brand-grid{grid-template-columns:repeat(2,1fr);}
  @media(min-width:700px){.brand-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:1020px){.brand-grid{grid-template-columns:repeat(4,1fr);}}
  .item-grid{grid-template-columns:repeat(2,1fr);}
  @media(min-width:640px){.item-grid{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:960px){.item-grid{grid-template-columns:repeat(4,1fr);}}

  .tile{position:relative; aspect-ratio:1/1; overflow:hidden; background:#fff; cursor:pointer; touch-action:pan-y;}
  .tile img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s ease;}
  .tile:hover img{transform:scale(1.045);}
  .tile .overlay{position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,.86) 100%); pointer-events:none;}
  .tile .tag{position:absolute; top:8px; left:8px; font-size:9px; letter-spacing:.08em; text-transform:uppercase; background:#fff; color:var(--ink); padding:3px 6px;}
  .tile .bottom{position:absolute; left:10px; right:10px; bottom:10px; color:#fff;}
  .tile .b-name{font-size:16px; font-weight:700; line-height:1.05; text-transform:uppercase; letter-spacing:.01em;}
  .tile .b-meta{font-size:9.5px; opacity:.8; margin-top:3px; letter-spacing:.03em; text-transform:uppercase;}
  .tile .i-cat{font-size:9px; letter-spacing:.08em; text-transform:uppercase; opacity:.85;}
  .tile .i-name{font-size:13px; font-weight:700; margin-top:2px; text-transform:uppercase; line-height:1.15;}
  .tile .swatches{display:flex; gap:5px; margin-top:6px;}
  .tile .swatches .dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.5); cursor:pointer;}
  .fav-btn{position:absolute; top:8px; right:8px; z-index:2; width:22px; height:22px; border:none; background:none; padding:0; display:flex; align-items:center; justify-content:center; cursor:pointer;}
  .fav-btn svg{width:13px; height:13px; overflow:visible;}
  .fav-btn svg path{fill:none; stroke:#fff; stroke-width:1.6; transition:fill .15s ease;}
  .fav-btn:hover svg path{fill:#fff;}
  .fav-btn.faved svg path{fill:#fff;}
  .coll-name-tag{display:inline-block; background:#fff; color:var(--ink); border:1px solid var(--ink); padding:5px 9px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; margin-top:5px;}

  /* every tile on the "Shared with you" page gets this badge, regardless of tile type —
     makes it unmistakable these are someone else's picks, distinct from your own heart-saves */
  .shared-grid .tile{position:relative;}
  .shared-grid .tile::after{content:"Shared"; position:absolute; top:38px; right:8px; z-index:3; background:var(--ink); color:#fff; font-size:8px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; padding:3px 8px; pointer-events:none;}

  /* product photography tiles (collections/models): full photo visible (no crop), no dark
     gradient — labels sit top-left (out of the photo's way), indicators sit bottom-left,
     same two spots for every product tile so collections and models read consistently */
  .tile.product-tile{background:#fff;}
  .tile.product-tile img{object-fit:contain;}
  .tile.product-tile .overlay{display:none;}
  .tile-top-labels{position:absolute; top:8px; left:8px; z-index:2; display:flex; flex-direction:column; align-items:flex-start; gap:4px; max-width:calc(100% - 40px);}
  .tile-top-labels .i-cat{display:inline-block; background:#fff; color:var(--grey); border:1px solid var(--ink); padding:3px 7px; font-size:8.5px; opacity:1;}
  .tile-bottom-indicators{position:absolute; left:8px; right:8px; bottom:8px; z-index:2; display:flex; flex-direction:column; gap:5px;}
  .tile.product-tile .swatches{margin-top:0;}
  .tile.product-tile .swatches .dot{border:1px solid rgba(0,0,0,.15); opacity:.4;}
  .tile.product-tile .swatches .dot.active{opacity:1;}
  .tile.product-tile .fav-btn svg path{stroke:var(--ink);}
  .tile.product-tile .fav-btn.faved svg path{fill:var(--ink);}

  .ambiance-head{margin-top:40px;}
  .ambiance-wrap{display:flex; align-items:center; gap:4px;}
  .ambiance-grid{display:flex; gap:12px; overflow-x:auto; flex:1 1 auto; min-width:0;
    scrollbar-width:none; -ms-overflow-style:none;}
  .ambiance-grid::-webkit-scrollbar{display:none; height:0;}
  .ambiance-card{flex:0 0 auto; display:flex; flex-direction:column;}
  .ambiance-imgwrap{position:relative; height:200px; cursor:pointer;}
  .ambiance-imgwrap img{height:100%; width:auto; display:block;}
  .amb-side{flex:0 0 auto; border:none; background:none; color:var(--ink); font-size:22px; line-height:1; cursor:pointer; padding:4px 8px;}
  .ambiance-caption{padding:8px 2px 0; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--grey);}
  .ambiance-brand-block{margin-bottom:36px;}
  .ambiance-brand-name{font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:.02em; margin:0 0 10px; cursor:pointer; display:inline-block;}
  .ambiance-brand-name:hover{text-decoration:underline;}
  .ambiance-fav-link{display:inline-block; margin:-8px 0 24px; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink); text-decoration:underline;}
  .amb-modal-imgwrap{position:relative; width:100%; background:#F2F2F0; border-bottom:1px solid var(--ink); overflow:hidden;}
  .amb-modal-imgwrap img{width:100%; height:auto; display:block;}
  .amb-modal-imgwrap .fav-btn{top:12px; right:12px;}
  .amb-modal-nav{position:absolute; top:50%; transform:translateY(-50%); border:none; background:none; color:var(--ink); font-size:30px; line-height:1; cursor:pointer; padding:6px 12px; z-index:2;
    text-shadow:0 0 6px rgba(255,255,255,.85), 0 0 3px rgba(255,255,255,.85);}
  .amb-modal-prev{left:2px;}
  .amb-modal-next{right:2px;}
  .amb-modal-top{display:flex; align-items:flex-start; justify-content:space-between; gap:12px;}
  .modal .amb-modal-top h2{font-size:14px; margin:2px 0 0;}
  .ambiance-wall{display:flex; flex-wrap:wrap; justify-content:center; gap:32px;}
  .ambiance-wall-item{position:relative; flex:0 0 calc(25% - 24px); cursor:pointer;}
  .ambiance-wall-item img{width:100%; height:auto; display:block;}
  .ambiance-wall-item.amb-portrait img{width:82%; margin:0 auto;}
  .ambiance-wall-item.amb-landscape img{width:110%; margin-left:-5%;}

  /* manual carousel controls: line segments (one per model) on collection tiles —
     fixed width each, don't stretch to fill the tile regardless of model count */
  .tile-lines{display:flex; gap:4px; flex-wrap:wrap;}
  .tile-lines .seg{flex:none; width:12px; height:1px; background:rgba(0,0,0,.2); cursor:pointer;}
  .tile-lines .seg.active{background:var(--ink);}

  /* same-brand hover flash: strobe invert on all tiles sharing data-brand */
  .tile.flash{animation:flashPulse .5s steps(2) infinite;}
  @keyframes flashPulse{0%,100%{filter:invert(0);}50%{filter:invert(1);}}

  .back{display:inline-flex; align-items:center; gap:6px; background:none; border:none; font-family:inherit; color:var(--ink); font-size:11.5px; cursor:pointer; padding:0; margin-bottom:16px; text-transform:uppercase; letter-spacing:.05em; font-weight:600;}
  /* plain flexbox (not grid) so the tall Stockist column can't inflate the logo/text/bio row heights above it;
     stockist is a fixed 1/3 of the full row; logo is always square, sized via JS to match the text column's height */
  .brand-detail-head{display:flex; align-items:stretch; margin-bottom:20px; border:1px solid var(--ink);}
  .bdh-left{display:flex; flex-direction:column; flex:0 0 66.667%; min-width:0;}
  .bdh-top{display:flex;}
  .bdh-logo{width:140px; height:140px; aspect-ratio:1/1; flex:none; display:flex; align-items:center; justify-content:center; background:#fff;}
  .bdh-logo img{max-width:78%; max-height:78%; object-fit:contain;}
  .bdh-logo .mark-fallback{width:36%; height:36%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-size:21px; font-weight:700;}
  .bdh-text{flex:1; min-width:0; padding:14px 18px; border-left:1px solid var(--ink);}
  .bdh-text .origin{font-size:10.5px; color:var(--grey); letter-spacing:.08em; text-transform:uppercase; margin-bottom:5px;}
  .bdh-text h1{font-size:23px; margin:0 0 6px; font-weight:700; text-transform:uppercase;}
  .bdh-text p{font-size:12.5px; color:#333; max-width:520px; margin:0 0 10px; line-height:1.5;}
  .site-link{font-size:12px; color:var(--ink); border-bottom:1px solid var(--ink); text-decoration:none; padding-bottom:1px; font-weight:600; text-transform:uppercase; letter-spacing:.03em;}
  .verify{font-size:9.5px; color:var(--grey); margin-left:8px; text-transform:none; letter-spacing:0;}
  .social-links{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .social-links a{font-size:10px; border:1px solid var(--ink); padding:5px 9px; text-decoration:none; color:var(--ink); text-transform:uppercase; letter-spacing:.04em; font-weight:600; display:inline-flex; align-items:center; gap:4px;}
  .social-links a:hover{background:var(--ink); color:#fff;}
  .bdh-bio{padding:14px 18px; border-top:1px solid var(--ink);}
  .bdh-bio .bio{font-size:12px; color:#333; line-height:1.55; margin:0;}
  .bdh-side{flex:0 0 33.333%; min-width:0; padding:14px 18px; border-left:1px solid var(--ink);}
  @media(max-width:720px){
    .brand-detail-head{flex-direction:column;}
    .bdh-left{flex:none; width:100%;}
    .bdh-logo{align-self:center; width:110px; height:110px; margin:0 14px;}
    .bdh-side{flex:none; border-left:none; border-top:1px solid var(--ink);}
  }
  .stockist-label{font-size:10.5px; color:var(--grey); letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; display:block;}
  .stockist-list{max-height:280px; overflow-y:auto; border-top:1px solid #ddd;}
  .stockist-item{display:flex; align-items:baseline; justify-content:space-between; gap:10px; font-size:12px; padding:6px 0; border-bottom:1px solid #eee;}
  .stockist-item .s-place{color:var(--ink);}
  .stockist-item .s-city{color:var(--grey); font-size:10px; text-transform:uppercase; letter-spacing:.04em; margin-right:5px;}
  .stockist-item a{color:var(--ink); text-decoration:none; border-bottom:1px solid var(--ink); padding-bottom:1px; white-space:nowrap; font-weight:600;}
  .stockist-empty{font-size:11.5px; color:var(--grey);}

  .map-legend{display:flex; gap:16px; flex-wrap:wrap; margin-bottom:14px;}
  .map-legend-item{display:flex; align-items:center; gap:6px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink);}
  .map-legend-item .map-dot{width:10px; height:10px; border-radius:50%; display:inline-block; border:1px solid rgba(0,0,0,.2);}
  .map-container{width:100%; aspect-ratio:1/1; border:1px solid var(--ink); background:#f5f5f3;}
  .map-container .amap-layer{filter:grayscale(1);}
  .map-loading{display:flex; align-items:center; justify-content:center; height:100%; color:var(--grey); font-size:12.5px; text-transform:uppercase; letter-spacing:.04em;}
  .map-pin{width:16px; height:16px; border-radius:50%; cursor:pointer;}
  .map-cluster{border-radius:50%; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Space Grotesk',sans-serif; font-weight:600; cursor:pointer;}

  .modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; align-items:flex-end; justify-content:center; z-index:100;}
  .modal-bg.open{display:flex;}
  @media(min-width:720px){.modal-bg{align-items:center;}}
  .modal{background:#fff; width:100%; max-width:620px; max-height:92vh; overflow-y:auto; border:1px solid var(--ink); border-bottom:none;}
  @media(min-width:720px){.modal{border-bottom:1px solid var(--ink);}}
  .modal .mimg{width:100%; aspect-ratio:4/3; object-fit:cover; display:block; border-bottom:1px solid var(--ink);}
  .img-blank{width:100%; height:100%; background:#F2F2F0;}
  .modal .img-blank{height:auto;}
  .modal .mbody{padding:20px 22px 26px; position:relative;}
  .modal-close{position:absolute; top:-42px; right:0; background:#fff; border:1px solid var(--ink); width:34px; height:34px; cursor:pointer; font-size:17px; line-height:1;}
  .modal .cat{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--grey);}
  .modal h2{font-size:22px; font-weight:700; margin:6px 0 2px; text-transform:uppercase;}
  .modal .brand-line{font-size:12.5px; color:var(--grey); margin-bottom:14px; text-transform:uppercase; letter-spacing:.03em;}
  .modal .row{display:flex; gap:24px; flex-wrap:wrap; margin:14px 0; font-size:11.5px; border-top:1px solid #ddd; padding-top:14px;}
  .modal .row div{color:var(--grey); text-transform:uppercase; letter-spacing:.03em;}
  .modal .row strong{display:flex; gap:6px; align-items:center; color:var(--ink); font-weight:600; font-size:13px; margin-top:4px;}
  .modal .actions{display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;}
  .btn{font-family:inherit; font-size:11.5px; padding:11px 16px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; text-transform:uppercase; letter-spacing:.05em; font-weight:600;}
  .btn.primary{background:var(--ink); color:#fff; border:1px solid var(--ink);}
  .btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--ink);}

  .empty{grid-column:1/-1; background:#fff; padding:60px 10px; text-align:center; color:var(--grey); font-size:12.5px; text-transform:uppercase; letter-spacing:.04em;}
  .footnote{margin-top:30px; font-size:11px; color:var(--grey); border-top:1px solid #ddd; padding-top:14px; line-height:1.6;}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="wordmark" onclick="goHome()">
      <span class="mark">B</span>
      <span class="name">BrandBook</span>
    </div>
    <nav class="tabs">
      <button class="tab-btn active" data-tab="brands">Brands</button>
      <button class="tab-btn" data-tab="catalog">Catalog</button>
      <button class="tab-btn" data-tab="color">Color</button>
      <button class="tab-btn" data-tab="favorites">Favorites</button>
      <button class="tab-btn" data-tab="map">Map</button>
      <button class="tab-btn" data-tab="ambiance">Ambiance</button>
    </nav>
    <div class="search-wrap"><input id="searchInput" placeholder="Search brand or item…" oninput="renderCurrent()"></div>
  </div>
</header>

<main id="main"></main>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this) closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>

// Favorites: stored locally in this browser only — no login, no backend. Each visitor
// builds their own saved list, which persists across visits as long as it's the same
// browser/device (clearing browser data or switching devices starts a fresh list).
const FAV_KEY='bb_favorites';
function getFavorites(){
  try{ return new Set(JSON.parse(localStorage.getItem(FAV_KEY)||"[]")); }
  catch(e){ return new Set(); }
}
function isFavorited(id){ return getFavorites().has(id); }
function toggleFavorite(id,event){
  event.stopPropagation();
  const favs=getFavorites();
  if(favs.has(id)) favs.delete(id); else favs.add(id);
  localStorage.setItem(FAV_KEY, JSON.stringify([...favs]));
  renderCurrent();
}

function favBtnHTML(id){
  const on=isFavorited(id);
  return `<button class="fav-btn ${on?'faved':''}" onclick="toggleFavorite('${id}',event)" title="${on?'Remove from':'Save to'} favorites">
    <svg viewBox="0 0 24 24"><path d="${HEART_PATH}"/></svg>

}

function renderCurrent(){
  const q=(document.getElementById('searchInput')?.value||"").toLowerCase();
  if(state.brand){ renderBrandDetail(state.brand,q); return; }
  if(state.tab==='shared') { renderSharedList(q); return; }
  if(state.tab==='map') { renderMap(); return; }
  if(state.tab==='ambiance') { renderAmbianceTab(q); return; }
  if(state.tab==='brands') renderBrandGrid(q);
  else if(state.tab==='favorites') renderFavorites(q);
  else renderCrossFilter(state.tab==='catalog'?'cat':'color', q);
}

// Looks up which items/collections/models match a set of favorite-style ids —
// shared by "my own favorites" and "someone else's shared list" views.
function collectByIds(idSet,q){
  let items=ITEMS.filter(i=>idSet.has(i.id));
  let colls=[];
  let models=[];
  BRANDS.forEach(b=>{ (b.collections||[]).forEach((c,idx)=>{
    if(idSet.has(`${b.id}::${c.name}`)) colls.push({b,c,idx});
    c.models.forEach(m=>{
      if(idSet.has(`${b.id}::${c.name}::${m.name}`)) models.push({b,c,m});
    });
  });});
  let ambiancePics=AMBIANCE_PHOTOS.filter(p=>idSet.has(p.id));
  if(q){
    items=items.filter(i=>i.name.toLowerCase().includes(q));
    colls=colls.filter(({c})=>c.name.toLowerCase().includes(q));
    models=models.filter(({m})=>m.name.toLowerCase().includes(q));
    ambiancePics=ambiancePics.filter(p=>(p.project||'').toLowerCase().includes(q));
  }
  return {items,colls,models,ambiancePics};
}
function tilesHTML({items,colls,models,ambiancePics}){
  return items.map(itemTileHTML).join('')
    + colls.map(({b,c,idx})=>collectionTileHTML(c,b,idx)).join('')
    + models.map(({b,c,m})=>modelTileHTML(b,c,m)).join('')
    + (ambiancePics||[]).map(ambiancePhotoTileHTML).join('');
}

function setFavView(v){ state.favView=v; renderCurrent(); }
function renderFavorites(q){
  const {items,colls,models,ambiancePics}=collectByIds(getFavorites(),q);
  const productCount=items.length+colls.length+models.length;
  const total=productCount+ambiancePics.length;
  const view=state.favView==='ambiance'?'ambiance':'products';
  const gridHTML = view==='ambiance'
    ? ambiancePics.map(ambiancePhotoTileHTML).join('')
    : items.map(itemTileHTML).join('') + colls.map(({b,c,idx})=>collectionTileHTML(c,b,idx)).join('') + models.map(({b,c,m})=>modelTileHTML(b,c,m)).join('');
  const emptyMsg = view==='ambiance'
    ? 'No Ambiance photos saved yet — tap the heart on any photo in the Ambiance tab to save it here.'
    : 'Nothing saved yet — tap the heart on any collection or model to save it here.';
  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <div><h1>Favorites</h1><p>Saved on this device — tap the heart on any tile to add or remove.</p></div>
      <span class="count-pill">${total} saved</span>
    </div>

let amapLoadingPromise=null;
function loadAmapSDK(){
  if(window.AMap) return Promise.resolve();
  if(amapLoadingPromise) return amapLoadingPromise;
  amapLoadingPromise=new Promise((resolve,reject)=>{
    window._AMapSecurityConfig={securityJsCode:AMAP_SECURITY_CODE};
    const script=document.createElement('script');
    script.src=`https://webapi.amap.com/maps?v=2.0&key=${AMAP_KEY}`;
    script.onload=resolve;
    script.onerror=reject;
    document.head.appendChild(script);
  });
  return amapLoadingPromise;
}
function geocodeAddress(address){
  return new Promise(resolve=>{
    let done=false;
    const finish=(val)=>{ if(!done){ done=true; resolve(val); } };
    setTimeout(()=>finish(null), 6000);
    const geocoder=new AMap.Geocoder({});
    geocoder.getLocation(address,(status,result)=>{
      finish(status==='complete' && result.geocodes.length ? result.geocodes[0].location : null);
    });
  });
}

// Geocoding ~700 addresses on every visit would be slow, so successful results are
// cached by address text in localStorage — failures aren't cached, so a transient
// hiccup just gets retried next time instead of being stuck forever.
const GEOCODE_CACHE_KEY='bb_geocode_cache';
function loadGeocodeCache(){
  try{ return JSON.parse(localStorage.getItem(GEOCODE_CACHE_KEY)||"{}"); }
  catch(e){ return {}; }
}
function saveGeocodeCache(cache){
  try{ localStorage.setItem(GEOCODE_CACHE_KEY, JSON.stringify(cache)); }catch(e){}
}

function renderMap(){
  const locs=getAllMapLocations();
  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <div><h1>Map</h1><p>Showrooms, materials sources, factories, and spaces worth remembering.</p></div>
      <span class="count-pill">${locs.length} pins</span>
    </div>
    <div class="map-legend">
      ${Object.values(MAP_CATEGORIES).map(c=>`<span class="map-legend-item"><span class="map-dot" style="background:${c.color}"></span>${c.label}</span>`).join('')}
    </div>
    <div id="amap-container" class="map-container"><div class="map-loading">Loading map…</div></div>
  `;
  loadAmapSDK().then(()=>{
    const container=document.getElementById('amap-container');
    container.innerHTML='';
    const map=new AMap.Map(container,{zoom:5,center:[113.5,34.5],mapStyle:'amap://styles/whitesmoke'});
    AMap.plugin(['AMap.Geocoder','AMap.MarkerCluster'], async ()=>{
      const clusterOf={};
      const clusterFor=(catKey)=>{
        if(clusterOf[catKey]) return clusterOf[catKey];
        const cat=MAP_CATEGORIES[catKey]||MAP_CATEGORIES.store;
        clusterOf[catKey]=new AMap.MarkerCluster(map, [], {
          gridSize:20,
          renderClusterMarker(context){
            const count=context.count;
            const size=Math.min(20+Math.sqrt(count)*6, 40);
            const el=document.createElement('div');
            el.className='map-cluster';
            el.style.background=cat.color;
            el.style.width=el.style.height=size+'px';
            el.style.fontSize=(size>32?'12.5px':'11px');
            el.textContent=count;
            context.marker.setContent(el);
            context.marker.setOffset(new AMap.Pixel(-size/2,-size/2));
            context.marker.on('click',()=>{
              map.setZoomAndCenter(Math.min(map.getZoom()+2,18), context.marker.getPosition());
            });
          },
          renderMarker(context){
            const d=context.data[0];
            const el=document.createElement('div');
            el.className='map-pin';
            el.style.background=cat.color;
            context.marker.setContent(el);
            context.marker.setOffset(new AMap.Pixel(-8,-8));
            context.marker.on('click',()=>{
              new AMap.InfoWindow({content:`<div style="font-family:'Space Grotesk',sans-serif;font-size:12.5px;padding:2px 4px;max-width:200px;"><strong>${d.name}</strong><br>${cat.label}<br>${d.address}</div>`}).open(map,d.lnglat);
            });
          }
        });
        return clusterOf[catKey];
      };

      const cache=loadGeocodeCache();
      let anyPoint=false;
      const addPoints=(pts)=>{
        if(!pts.length) return;
        const byCat={};
        pts.forEach(p=>{ (byCat[p.cat]=byCat[p.cat]||[]).push(p); });
        Object.keys(byCat).forEach(catKey=>clusterFor(catKey).addData(byCat[catKey]));
        anyPoint=true;
      };

      const cached=[], toGeocode=[];
      locs.forEach(loc=>{
        const pos=cache[loc.address];
        if(pos) cached.push({lnglat:pos, name:loc.name, address:loc.address, cat:loc.cat});
        else toGeocode.push(loc);
      });
      addPoints(cached);
      if(anyPoint) map.setFitView();

      const CONCURRENCY=4;
      for(let i=0;i<toGeocode.length;i+=CONCURRENCY){
        const batch=toGeocode.slice(i,i+CONCURRENCY);
        const results=await Promise.all(batch.map(loc=>geocodeAddress(loc.address)));
        const newPoints=[];
        results.forEach((pos,idx)=>{
          const loc=batch[idx];
          if(!pos) return;
          cache[loc.address]=pos;
          newPoints.push({lnglat:pos, name:loc.name, address:loc.address, cat:loc.cat});
        });
        saveGeocodeCache(cache);
        addPoints(newPoints);
      }
      if(anyPoint) map.setFitView();
    });
  }).catch(()=>{
    document.getElementById('amap-container').innerHTML='<div class="map-loading">Could not load the map — check your connection or API key.</div>';
  });
}

// Preview cycling only runs while a tile is actually hovered (desktop) — no more
// always-on auto-advance. Each tile gets its own timer, started on mouseenter,
// stopped and reset back to the first image on mouseleave.
function wireHoverCycle(){
  document.querySelectorAll('.cycle-tile').forEach(tile=>{
    if(tile.dataset.hoverWired) return;
    tile.dataset.hoverWired='1';
    let timer=null;
    tile.addEventListener('mouseenter', ()=>{
      const imgs=JSON.parse(tile.dataset.images||"[]");
      if(imgs.length<2) return;
      timer=setInterval(()=>{
        const idx=(parseInt(tile.dataset.idx||"0")+1)%imgs.length;
        setActiveImage(tile,idx);
      },700);
    });
    tile.addEventListener('mouseleave', ()=>{
      if(timer){ clearInterval(timer); timer=null; }
      setActiveImage(tile,0);
    });
  });
}

// Shared by hover-cycling, clicking a line/dot indicator, and swiping — keeps the tile's
// image, data-idx, and indicator active-states all in sync regardless of what triggered it.
function setActiveImage(tileEl,idx){
  if(!tileEl) return;
  const imgs=JSON.parse(tileEl.dataset.images||"[]");
  if(imgs.length===0) return;
  idx=((idx%imgs.length)+imgs.length)%imgs.length;
  tileEl.dataset.idx=idx;
  const imgEl=tileEl.querySelector('img');
  if(imgEl) imgEl.src=imgs[idx];
  tileEl.querySelectorAll('.tile-lines .seg').forEach((s,i)=>s.classList.toggle('active',i===idx));
  tileEl.querySelectorAll('.swatches .dot[data-idx]').forEach(d=>{
    d.classList.toggle('active', parseInt(d.dataset.idx)===idx);
  });
}

function lineIndicatorsHTML(count){
  if(count<2) return '';
  let segs='';
  for(let i=0;i<count;i++){
    segs+=`<span class="seg ${i===0?'active':''}" onclick="event.stopPropagation(); setActiveImage(this.closest('.cycle-tile'), ${i});"></span>`;
  }
  return `<div class="tile-lines">${segs}</div>`;
}

// Swipe left/right on a tile (phone) advances/reverses its carousel, same as clicking
// a line/dot indicator would on desktop. A tap that doesn't move stays a normal click.
function wireSwipe(){
  document.querySelectorAll('.cycle-tile').forEach(tile=>{
    if(tile.dataset.swipeWired) return;
    tile.dataset.swipeWired='1';
    let startX=0,startY=0,dragging=false;
    tile.addEventListener('touchstart', e=>{
      startX=e.touches[0].clientX; startY=e.touches[0].clientY; dragging=false;
    },{passive:true});
    tile.addEventListener('touchmove', e=>{
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(Math.abs(dx)>10 && Math.abs(dx)>Math.abs(dy)) dragging=true;
    },{passive:true});
    tile.addEventListener('touchend', e=>{
      if(!dragging) return;
      const dx=e.changedTouches[0].clientX-startX;
      if(Math.abs(dx)<30) return;
      const idx=parseInt(tile.dataset.idx||"0");
      setActiveImage(tile, dx<0?idx+1:idx-1);
      e.preventDefault();
    });
  });
}

// Pads an incomplete last row with invisible white filler cells so the grid's
// black background-as-hairline technique doesn't show through as a stray box.
function fillGridGap(selector,bp1,bp2){
  const grid=document.querySelector(selector);
  if(!grid) return;
  grid.querySelectorAll('.tile-filler').forEach(f=>f.remove());
  const count=grid.querySelectorAll('.tile').length;
  if(count===0) return;
  const w=window.innerWidth;
  const cols=w>=bp2?4:w>=bp1?3:2;
  const remainder=count%cols;
  const fillers=remainder===0?0:cols-remainder;
  for(let i=0;i<fillers;i++){
    const d=document.createElement('div');
    d.className='tile-filler';
    grid.appendChild(d);
  }
}

  return `
    <div class="ambiance-wrap">
      <button class="amb-side amb-side-prev" onclick="ambianceShift(this,-1)" aria-label="Previous">‹</button>
      <div class="ambiance-grid">
        ${photos.map(p=>`
          <div class="ambiance-card">
            <div class="ambiance-imgwrap" data-amb-id="${p.id}" onclick="openAmbiancePhoto('${p.id}', this)">
              <img src="${p.img}" alt="${p.project||''}">
              ${favBtnHTML(p.id)}
            </div>
            ${p.project?`<div class="ambiance-caption">${p.project}</div>`:''}
          </div>`).join('')}
      </div>
      <button class="amb-side amb-side-next" onclick="ambianceShift(this,1)" aria-label="Next">›</button>
    </div>
  `;
}
function ambianceShift(btn,dir){
  const track=btn.closest('.ambiance-wrap').querySelector('.ambiance-grid');
  track.scrollBy({left:dir*track.clientWidth*0.9, behavior:'smooth'});
}
// The aggregated Ambiance tab shows a single flat wall of every curated photo —
// smaller thumbnails, no arrows, no per-brand grouping, just scroll the page and
// click a photo to enlarge. Portrait photos are sized down and landscape photos
// sized up (10% each way) once their real dimensions are known, so tall images
// don't visually dominate the wall next to short wide ones.
function classifyAmbianceOrientation(img){
  const item=img.closest('.ambiance-wall-item');
  if(!item || !img.naturalWidth || !img.naturalHeight) return;
  item.classList.toggle('amb-portrait', img.naturalHeight>img.naturalWidth);
  item.classList.toggle('amb-landscape', img.naturalWidth>img.naturalHeight);
}
function ambianceWallHTML(photos){
  return `
    <div class="ambiance-wall">
      ${photos.map(p=>`
        <div class="ambiance-wall-item" data-amb-id="${p.id}" onclick="openAmbiancePhoto('${p.id}', this)">
          <img src="${p.img}" alt="${p.project||''}" onload="classifyAmbianceOrientation(this)">
          ${favBtnHTML(p.id)}
        </div>`).join('')}
    </div>
  `;
}
function ambiancePhotoTileHTML(p){
  const b=brandOf(p.brand);
  return `
    <div class="tile product-tile" data-brand="${p.brand}" onclick="openAmbiancePhoto('${p.id}')">
      <div class="tile-top-labels">
        <div class="i-cat">Ambiance · ${b.name}</div>
        ${p.project?`<div class="coll-name-tag">${p.project}</div>`:''}
      </div>
      ${favBtnHTML(p.id)}
      <img src="${p.img}" alt="${p.project||''}" style="width:100%;height:100%;object-fit:cover;">
    </div>`;
}
// Arrow navigation inside the enlarged view stays within whatever list of photos
// the user opened it from: the brand page's own strip, or the full cross-brand
// wall from the main Ambiance tab. `el` (the clicked thumbnail) is only passed the
// first time a photo is opened — that's when the context list is (re)computed from
// its containing strip/wall; subsequent nav/favorite re-renders reuse it.
let AMBIANCE_MODAL_CTX = null;
function openAmbiancePhoto(id, el){
  const p=AMBIANCE_PHOTOS.find(x=>x.id===id);
  if(!p) return;
  if(el){
    const container = el.closest('.ambiance-grid, .ambiance-wall');
    AMBIANCE_MODAL_CTX = container ? [...container.querySelectorAll('[data-amb-id]')].map(n=>n.dataset.ambId) : AMBIANCE_PHOTOS.map(x=>x.id);
  } else if(!AMBIANCE_MODAL_CTX || !AMBIANCE_MODAL_CTX.includes(id)){
    AMBIANCE_MODAL_CTX = AMBIANCE_PHOTOS.map(x=>x.id);
  }
  const b=brandOf(p.brand);
  const faved=isFavorited(p.id);
  const modalContent=document.getElementById('modalContent');
  modalContent.dataset.ambId=id;
  modalContent.innerHTML = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="amb-modal-imgwrap">
      <button class="amb-modal-nav amb-modal-prev" onclick="ambianceModalNav(-1)" aria-label="Previous">‹</button>
      <img src="${p.img}" alt="${p.project||''}">
      <button class="fav-btn ${faved?'faved':''}" onclick="toggleFavorite('${p.id}',event); openAmbiancePhoto('${p.id}');" title="${faved?'Remove from':'Save to'} favorites">
        <svg viewBox="0 0 24 24"><path d="${HEART_PATH}"/></svg>
      </button>
      <button class="amb-modal-nav amb-modal-next" onclick="ambianceModalNav(1)" aria-label="Next">›</button>
    </div>
    <div class="mbody">
      <div class="amb-modal-top">
        <div>
          ${p.project?`<div class="cat">${p.project}</div>`:''}
          <h2>${b.name}</h2>
        </div>
      </div>
      <div class="actions">
        <a class="btn primary" href="${b.site}" target="_blank" rel="noopener">${b.name} site ↗</a>
        <a class="btn ghost" href="#" onclick="closeModal(); openBrand('${b.id}'); return false;">View brand page</a>
      </div>
    </div>
  `;
  document.getElementById('modalBg').classList.add('open');
}
function ambianceModalNav(dir){
  if(!AMBIANCE_MODAL_CTX) return;
  const curId=document.getElementById('modalContent').dataset.ambId;
  const idx=AMBIANCE_MODAL_CTX.indexOf(curId);
  if(idx===-1) return;
  const nextIdx=(idx+dir+AMBIANCE_MODAL_CTX.length)%AMBIANCE_MODAL_CTX.length;
  openAmbiancePhoto(AMBIANCE_MODAL_CTX[nextIdx]);
}

function renderAmbianceTab(q){
  const curated=BRANDS.filter(b=>b.ambiance && b.ambiance.length);
  const list=q ? curated.filter(b=>b.name.toLowerCase().includes(q)) : curated;
  const photos=list.flatMap(b=>ambiancePhotos(b));
  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <div><h1>Ambiance</h1><p>Curated inspiration galleries — real projects from the brands we've added them for.</p></div>
      <span class="count-pill">${photos.length} photo${photos.length===1?'':'s'}</span>
    </div>
    <a href="#" class="ambiance-fav-link" onclick="setTab('favorites'); return false;">View my favorites →</a>
    ${photos.length ? ambianceWallHTML(photos) : `<div class="empty">No Ambiance galleries curated yet.</div>`}
  `;
}

function collectionsSectionHTML(b,q){
  if(state.collection!==null) return modelGridHTML(b,state.collection);
  const collCats=[...new Set(b.collections.flatMap(c=>c.cat))];
  let list=b.collections.map((c,i)=>({...c,_idx:i}));
  if(state.collCatFilter) list=list.filter(c=>c.cat.includes(state.collCatFilter));
  if(q) list=list.filter(c=>c.name.toLowerCase().includes(q));
  return `
    <div class="chips">${collCats.map(c=>`<button class="chip ${state.collCatFilter===c?'active':''}" onclick="toggleCollCat('${c}')">${c}</button>`).join('')}</div>
    <div class="grid item-grid">${list.map(c=>collectionTileHTML(c,b)).join('') || emptyHTML()}</div>
  `;
}

function collectionTileHTML(c,b,idxOverride){
  const favId=`${b.id}::${c.name}`;
  const idx=idxOverride!==undefined?idxOverride:c._idx;
  const clickJs=idxOverride!==undefined?`openBrandCollection('${b.id}',${idx})`:`openCollection(${idx})`;
  const imgs=c.models.map(m=>m.colors[0]?.img).filter(Boolean);
  return `
    <div class="tile cycle-tile product-tile" data-images='${JSON.stringify(imgs)}' data-idx="0" onclick="${clickJs}">
      <div class="tile-top-labels">
        <div class="i-cat">${c.cat.join(' · ')} · ${c.models.length} model${c.models.length===1?'':'s'}</div>
        <div class="coll-name-tag">${c.name}</div>
      </div>
      ${favBtnHTML(favId)}
      ${imgs.length ? `<img src="${imgs[0]}" alt="${c.name}">` : `<div class="img-blank"></div>`}
      <div class="tile-bottom-indicators">${lineIndicatorsHTML(imgs.length)}</div>
    </div>`;
}

function modelGridHTML(b,collIdx){
  const c=b.collections[collIdx];
  return `
    <button class="back" onclick="backToCollections()">← ${b.name} collections</button>
    <div class="grid item-grid">${c.models.map(m=>modelTileHTML(b,c,m)).join('') || emptyHTML()}</div>
  `;
}

function modelTileHTML(b,c,m){
  const imgs=m.colors.map(col=>col.img);
  const favId=`${b.id}::${c.name}::${m.name}`;
  return `
    <div class="tile cycle-tile product-tile" data-images='${JSON.stringify(imgs)}' data-idx="0" onclick="window.open('${c.link}','_blank')">
      <div class="tile-top-labels">
        <div class="i-cat">${c.name}</div>
        <div class="coll-name-tag">${m.name}</div>
      </div>
      ${favBtnHTML(favId)}
      ${imgs.length ? `<img src="${imgs[0]}" alt="${m.name}">` : `<div class="img-blank"></div>`}
      <div class="tile-bottom-indicators">
        <div class="swatches">${m.colors.map((col,i)=>col.pal
          ? `<span class="dot ${i===0?'active':''}" data-idx="${i}" style="background:${colorHex(col.pal)}" onclick="event.stopPropagation(); setActiveImage(this.closest('.cycle-tile'), ${i});"></span>`
          : '').join('')}</div>
      </div>
    </div>`;
}

function sizeBrandLogo(){
  const textEl = document.querySelector('.bdh-text');
  const logoEl = document.querySelector('.bdh-logo');
  if(!textEl || !logoEl) return;
  const apply = ()=>{
    if(window.innerWidth <= 720){
      logoEl.style.width = '';
      logoEl.style.height = '';
      return;
    }
    const size = textEl.offsetHeight;
    logoEl.style.width = size+'px';
    logoEl.style.height = size+'px';
  };
  requestAnimationFrame(apply);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=>requestAnimationFrame(apply));
}
window.addEventListener('resize', ()=>{ if(state.brand) sizeBrandLogo(); });

function renderCrossFilter(mode,q){
  const options = mode==='cat' ? CATALOGS : Object.keys(PALETTE);
  const active = mode==='cat' ? state.catFilter : state.colorFilter;
  let items = ITEMS;
  if(state.catFilter) items = items.filter(i=>i.cat===state.catFilter);
  if(state.colorFilter) items = items.filter(i=>i.colors.includes(state.colorFilter));
  if(q) items = items.filter(i=> i.name.toLowerCase().includes(q) || brandOf(i.brand).name.toLowerCase().includes(q));
  document.getElementById('main').innerHTML = `
    <div class="section-head">
      <div><h1>${mode==='cat'?'By Catalog':'By Color'}</h1><p>Browsing across all brands.</p></div>
      <span class="count-pill">${items.length} pieces</span>
    </div>
    <div class="chips">${options.map(o=>`
      <button class="chip ${active===o?'active':''}" onclick="toggleFilter('${mode}','${o}')">
        ${mode==='color'?`<span class="dot" style="background:${colorHex(o)}"></span>`:''}${o}
      </button>`).join('')}
    </div>
    <div class="grid item-grid">${items.map(itemTileHTML).join('') || emptyHTML()}</div>
  `;
  wireHoverFlash();
  fillGridGap('.item-grid',640,960);
}

function toggleFilter(kind,val){
  if(kind==='cat') state.catFilter = state.catFilter===val?null:val;
  if(kind==='color') state.colorFilter = state.colorFilter===val?null:val;
  renderCurrent();
}

function itemTileHTML(i){
  const b=brandOf(i.brand);
  return `
    <div class="tile product-tile" data-brand="${i.brand}" onclick='openItem("${i.id}")'>
      <div class="tile-top-labels">
        <div class="i-cat">${i.cat} · ${b.name}</div>
        <div class="coll-name-tag">${i.name}</div>
      </div>
      ${favBtnHTML(i.id)}
      <div class="img-blank"></div>
      <div class="tile-bottom-indicators">
        <div class="swatches">${i.colors.map(c=>`<span class="dot" style="background:${colorHex(c)}"></span>`).join('')}</div>
      </div>
    </div>`;
}
function emptyHTML(){ return `<div class="empty">No pieces match these filters yet.</div>`; }

function openItem(id){
  const i = ITEMS.find(x=>x.id===id);
  const b = brandOf(i.brand);
  const outLink = i.link || b.site;
  document.getElementById('modalContent').innerHTML = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="mimg img-blank"></div>
    <div class="mbody">
      <div class="cat">${i.cat}</div>
      <h2>${i.name}</h2>
      <div class="brand-line">${b.name} · ${b.origin}</div>
      <div class="row">
        <div>Colorways<strong>${i.colors.map(c=>`<span class="dot" style="width:14px;height:14px;border-radius:50%;background:${colorHex(c)};display:inline-block;"></span>`).join('')}</strong></div>
        <div>Catalog<strong>${i.cat}</strong></div>
        <div>Brand origin<strong>${b.origin}</strong></div>
      </div>
      <div style="font-size:11px;color:var(--grey);margin-top:10px;line-height:1.5;">
        Photo: placeholder — product photography is copyrighted by ${b.name} and isn't reproduced here.
        ${i.link ? "This item is verified against the brand's official product page." : ""} See the real photo at the link below.
      </div>
      <div class="actions">
        <a class="btn primary" href="${outLink}" target="_blank" rel="noopener">${i.link?'Official product page ↗':'Brand site ↗'}</a>
        <a class="btn ghost" href="#" onclick="alert('Amap integration: will drop a pin at the showroom where this brand was seen in person.'); return false;">Find in store (Amap) 📍</a>
      </div>
    </div>
  `;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }

// If this page was opened via a shared-favorites link, land on that view instead
// of the normal homepage — the visitor's own saved favorites are untouched either way.
const sharedParam=new URLSearchParams(location.search).get('shared');
if(sharedParam){
  const decoded=decodeShareIds(sharedParam);
  if(decoded){ SHARED_IDS=decoded; state.tab='shared'; }
}
renderCurrent();
</script>
</body>
</html>
